- name: Deploy GitOps Task Manager
  hosts: web
  become: yes

  tasks:
    - name: Install required packages
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - rsync
        state: present
        update_cache: yes

    - name: Create application directory
      file:
        path: /opt/gitops-task-manager
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy project files with rsync
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: /opt/gitops-task-manager/
        delete: yes
        rsync_opts:
          - "--exclude=venv"
          - "--exclude=.git"
          - "--exclude=__pycache__"
          - "--exclude=.pytest_cache"
          - "--exclude=.env"
          - "--exclude=tasks.db"

    - name: Create virtual environment and install dependencies
      pip:
        requirements: /opt/gitops-task-manager/requirements.txt
        virtualenv: /opt/gitops-task-manager/venv
        virtualenv_python: python3

    - name: Create .env file
      copy:
        dest: /opt/gitops-task-manager/.env
        content: |
          DATABASE_URL=sqlite:////opt/gitops-task-manager/tasks.db
          FLASK_ENV=production
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Stop old Flask app
      shell: pgrep -f "python.*app.py" && pkill -f "python.*app.py" || true
      failed_when: false
      changed_when: false

    - name: Fix app directory ownership
      file:
        path: /opt/gitops-task-manager
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: yes
        
    - name: Start Flask app
      shell: |
        cd /opt/gitops-task-manager
        nohup venv/bin/python app.py > app.log 2>&1 &
      become: no
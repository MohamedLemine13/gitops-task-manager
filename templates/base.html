<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GitOps Task Manager – Gérez vos tâches simplement avec une interface moderne.">
    <title>{% block title %}GitOps Task Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">⚙️</span>
                <h1>GitOps Task Manager</h1>
            </div>
            <p class="tagline">Pipeline-ready task tracking</p>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 GitOps Task Manager &mdash; CI/CD Ready</p>
    </footer>
</body>

</html>
